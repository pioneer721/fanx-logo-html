<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Replica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }
  .logo {
    width: 400px;
    height: 400px;
    display: block;
  }
</style>
</head>
<body>
  <svg class="logo" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
    <!-- Yellow square background - matching sampled color (253,197,0) -->
    <rect x="0" y="0" width="400" height="400" fill="#FDC500"/>

    <!-- LEFT shape: polygon with central tip at (200,200) so it meets RIGHT's tip. -->
    <path d="M 97 141
             L 168 141
             L 200 200
             L 200 259
             L 97 259
             L 97 200
             L 168 200
             L 156 170
             L 97 170
             Z"
          fill="#F2F6F9"/>

    <!-- RIGHT shape: 180° rotation of LEFT around (200,200). Tips share (200,200). -->
    <path d="M 303 259
             L 232 259
             L 200 200
             L 200 141
             L 303 141
             L 303 200
             L 232 200
             L 244 230
             L 303 230
             Z"
          fill="#F2F6F9"/>
  </svg>
</body>
</html>
