<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Replica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .logo {
    width: 400px;
    height: 400px;
    display: block;
  }

  /* See Code button, positioned below the logo */
  .see-code-btn {
    margin-top: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 52px;
    padding: 0 26px;
    border: none;
    border-radius: 999px;
    background: #111111;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  }
  .see-code-btn:hover {
    background: #000000;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.24);
  }
  .see-code-btn:active {
    transform: translateY(0);
  }
  .see-code-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .modal-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    width: min(720px, 92vw);
    max-height: 82vh;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(10px);
    transition: transform 0.15s ease;
  }
  .modal-backdrop.is-open .modal {
    transform: translateY(0);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #ececec;
  }
  .modal-title {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.02em;
  }
  .modal-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    border: 1px solid #e3e3e3;
    border-radius: 8px;
    background: #ffffff;
    color: #333333;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .icon-btn:hover {
    background: #f6f6f6;
    border-color: #d5d5d5;
  }
  .icon-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .icon-btn.is-copied {
    background: #eafbe5;
    border-color: #a8e0a0;
    color: #2d7a2d;
  }
  .close-btn {
    width: 32px;
    height: 32px;
    padding: 0;
    border: 1px solid #ececec;
    border-radius: 8px;
    background: #ffffff;
    color: #555;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .close-btn:hover {
    background: #f6f6f6;
    color: #111;
  }
  .modal-body {
    flex: 1 1 auto;
    min-height: 0;
    padding: 14px 18px 18px;
    overflow: hidden;
    display: flex;
  }
  .code-block {
    flex: 1 1 auto;
    margin: 0;
    padding: 14px 16px;
    background: #0f1115;
    color: #e6e9ef;
    border-radius: 8px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 12.5px;
    line-height: 1.55;
    white-space: pre;
    tab-size: 2;
  }
  .code-block code {
    font: inherit;
    color: inherit;
  }
</style>
</head>
<body>
  <svg class="logo" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
    <!-- Yellow square background - matching sampled color (253,197,0) -->
    <rect x="0" y="0" width="400" height="400" fill="#FDC500"/>

    <!-- LEFT shape: polygon with central tip at (200,200) so it meets RIGHT's tip. -->
    <path d="M 97 141
             L 168 141
             L 200 200
             L 200 259
             L 97 259
             L 97 200
             L 168 200
             L 156 170
             L 97 170
             Z"
          fill="#F2F6F9"/>

    <!-- RIGHT shape: 180° rotation of LEFT around (200,200). Tips share (200,200). -->
    <path d="M 303 259
             L 232 259
             L 200 200
             L 200 141
             L 303 141
             L 303 200
             L 232 200
             L 244 230
             L 303 230
             Z"
          fill="#F2F6F9"/>
  </svg>

  <!-- See Code floating button -->
  <button id="seeCodeBtn" class="see-code-btn" type="button" aria-label="See source code">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <polyline points="16 18 22 12 16 6"></polyline>
      <polyline points="8 6 2 12 8 18"></polyline>
    </svg>
    See Code
  </button>

  <!-- Modal -->
  <div id="codeModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="codeModalTitle">
    <div class="modal" role="document">
      <div class="modal-header">
        <h3 class="modal-title" id="codeModalTitle">HTML Source</h3>
        <div class="modal-actions">
          <button id="copyCodeBtn" class="icon-btn" type="button" aria-label="Copy code to clipboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span class="copy-label">Copy</span>
          </button>
          <button id="closeCodeBtn" class="close-btn" type="button" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <pre class="code-block"><code id="codeDisplay">Loading...</code></pre>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var btn = document.getElementById('seeCodeBtn');
      var modal = document.getElementById('codeModal');
      var closeBtn = document.getElementById('closeCodeBtn');
      var copyBtn = document.getElementById('copyCodeBtn');
      var codeDisplay = document.getElementById('codeDisplay');
      var copyLabel = copyBtn.querySelector('.copy-label');
      var cachedSource = null;

      function openModal() {
        modal.classList.add('is-open');
        if (cachedSource) {
          codeDisplay.textContent = cachedSource;
          return;
        }
        codeDisplay.textContent = 'Loading...';
        fetch(window.location.href, { cache: 'no-cache' })
          .then(function (r) { return r.text(); })
          .then(function (text) {
            cachedSource = text;
            codeDisplay.textContent = text;
          })
          .catch(function (err) {
            codeDisplay.textContent = 'Failed to load source: ' + err;
          });
      }

      function closeModal() {
        modal.classList.remove('is-open');
      }

      btn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
      });

      copyBtn.addEventListener('click', function () {
        var text = codeDisplay.textContent || '';
        var done = function () {
          copyBtn.classList.add('is-copied');
          copyLabel.textContent = 'Copied';
          setTimeout(function () {
            copyBtn.classList.remove('is-copied');
            copyLabel.textContent = 'Copy';
          }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(function () {
            fallbackCopy(text, done);
          });
        } else {
          fallbackCopy(text, done);
        }
      });

      function fallbackCopy(text, done) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        done();
      }
    })();
  </script>
</body>
</html>
